<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搞钱天赋测评</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .page {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: none;
      backdrop-filter: blur(10px);
    }
    .page.active {
      display: block;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 12px;
      color: #d63031;
      text-align: center;
    }
    .desc {
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
      text-align: center;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
      text-align: center;
      border-radius: 12px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
    }
    .question {
      margin-bottom: 20px;
    }
    .question p {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #2d3436;
    }
    .options label {
      display: block;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: white;
    }
    .options label:hover {
      border-color: #ff6b6b;
      background: #fff5f5;
    }
    .options input {
      margin-right: 10px;
    }
    .nav {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .nav button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .prev {
      background: #f1f1f1;
      color: #666;
    }
    .prev:hover {
      background: #e0e0e0;
    }
    .result-img {
      width: 100%;
      border-radius: 16px;
      margin-top: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      object-fit: contain;
    }
  </style>
</head>
<body>

<!-- 欢迎页 -->
<div class="page active" id="page-welcome">
  <h1>搞钱天赋测评</h1>
  <p class="desc">10题测出你天生适合靠什么发财，找到你的吸金体质！</p>
  <button class="btn" onclick="startTest()">开始测评</button>
</div>

<!-- 答题页 -->
<div class="page" id="page-question">
  <div class="question">
    <p id="q-title"></p>
  </div>
  <div class="options" id="q-options"></div>
  <div class="nav">
    <button class="prev" onclick="prevQ()">上一题</button>
    <button class="btn" onclick="nextQ()">下一题</button>
  </div>
</div>

<!-- 结果页 -->
<div class="page" id="page-result">
  <h1>你的搞钱天赋结果</h1>
  <p id="free-result" class="desc"></p>
  <img id="result-img" class="result-img">
</div>

<script>
  // 题目
  const questions = [
    {
      title: "1. 看到别人赚钱，你第一反应是？",
      options: [
        { text: "A 研究他的逻辑和方法", score: { A:1, B:0, C:0 } },
        { text: "B 觉得自己也能上手试试", score: { A:0, B:1, C:0 } },
        { text: "C 羡慕，但不太想行动", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "2. 你更擅长？",
      options: [
        { text: "A 分析趋势、找规律、做判断", score: { A:1, B:0, C:0 } },
        { text: "B 动手做事、落地执行", score: { A:0, B:1, C:0 } },
        { text: "C 聊天、社交、维护关系", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "3. 空闲时间你更偏向？",
      options: [
        { text: "A 刷资讯、学新知识、看机会", score: { A:1, B:0, C:0 } },
        { text: "B 做点小项目/兼职/动手折腾", score: { A:0, B:1, C:0 } },
        { text: "C 发朋友圈、拍视频、玩社交平台", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "4. 你对风险的态度？",
      options: [
        { text: "A 愿意为高收益承担合理风险", score: { A:1, B:0, C:0 } },
        { text: "B 稳一点，别亏最重要", score: { A:0, B:1, C:0 } },
        { text: "C 不太想碰复杂的东西", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "5. 别人对你的常见评价？",
      options: [
        { text: "A 脑子灵、看得远", score: { A:1, B:0, C:0 } },
        { text: "B 靠谱、能成事", score: { A:0, B:1, C:0 } },
        { text: "C 人缘好、会说话", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "6. 你更适合哪种赚钱方式？",
      options: [
        { text: "A 靠眼光/决策赚钱", score: { A:1, B:0, C:0 } },
        { text: "B 靠能力/执行力赚钱", score: { A:0, B:1, C:0 } },
        { text: "C 靠人气/表达/影响力赚钱", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "7. 给你1w启动资金，你会？",
      options: [
        { text: "A 理财、投资、买基金/课程", score: { A:1, B:0, C:0 } },
        { text: "B 做小生意、囤货、实体项目", score: { A:0, B:1, C:0 } },
        { text: "C 打造账号、做内容、包装自己", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "8. 遇到赚钱机会，你通常？",
      options: [
        { text: "A 先分析靠不靠谱", score: { A:1, B:0, C:0 } },
        { text: "B 先行动再说", score: { A:0, B:1, C:0 } },
        { text: "C 先问问身边人意见", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "9. 你对“名气/曝光”的看法？",
      options: [
        { text: "A 无所谓，赚到就行", score: { A:1, B:0, C:0 } },
        { text: "B 能帮我赚钱就好", score: { A:0, B:1, C:0 } },
        { text: "C 很喜欢被人关注、被认可", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "10. 你心中赚钱最重要的是？",
      options: [
        { text: "A 眼光", score: { A:1, B:0, C:0 } },
        { text: "B 能力", score: { A:0, B:1, C:0 } },
        { text: "C 人脉", score: { A:0, B:0, C:1 } }
      ]
    }
  ];

  // 5种结果（已按你最新上传的图片顺序一一对应）
  const types = [
    {
      name: "眼光型投资人",
      desc: "你擅长靠判断、趋势、信息差赚钱！",
      img: "https://p9-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/fe07059c843b4995afd53769c3f3edf3.png"
    },
    {
      name: "执行力实干家",
      desc: "你最稳、最靠谱，靠落地能力赚钱！",
      img: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/ecad805ce8214aeb99fd1999e234c04e.png"
    },
    {
      name: "影响力流量王",
      desc: "你靠人气、表达、社交影响力赚钱！",
      img: "https://p6-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/6eb5a900441b4422a92fd7c8d073b035.png"
    },
    {
      name: "创意内容家",
      desc: "你靠灵感、审美、创作能力赚钱！",
      img: "https://p3-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/394eee8a145b45dfab416032691b481f.png"
    },
    {
      name: "精明资源手",
      desc: "你靠人脉、链接、信息整合赚钱！",
      img: "https://p11-flow-imagex-sign.byteimg.com/tos-cn-i-a9rns2rl98/88c3e232d9d74924b6845021c7fe215b.png"
    }
  ];

  let currentQ = 0;
  let answers = Array(questions.length).fill(null);

  // 切换页面
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // 开始
  function startTest() {
    currentQ = 0;
    renderQ();
    showPage('page-question');
  }

  // 渲染题目
  function renderQ() {
    const q = questions[currentQ];
    document.getElementById('q-title').innerText = q.title;
    const box = document.getElementById('q-options');
    box.innerHTML = '';
    q.options.forEach((opt, i) => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="radio" name="q" value="${i}" ${answers[currentQ]==i ? 'checked' : ''}> ${opt.text}`;
      box.appendChild(label);
    });
  }

  // 上一题
  function prevQ() {
    if (currentQ > 0) {
      saveAnswer();
      currentQ--;
      renderQ();
    }
  }

  // 下一题 / 完成
  function nextQ() {
    saveAnswer();
    if (currentQ < questions.length - 1) {
      currentQ++;
      renderQ();
    } else {
      calcResult();
      showPage('page-result');
    }
  }

  // 保存答案
  function saveAnswer() {
    const sel = document.querySelector('input[name="q"]:checked');
    if (sel) answers[currentQ] = parseInt(sel.value);
  }

  // 算分并显示结果
  function calcResult() {
    let A = 0, B = 0, C = 0;
    answers.forEach((v, i) => {
      if (v == null) return;
      const s = questions[i].options[v].score;
      A += s.A;
      B += s.B;
      C += s.C;
    });

    let typeIndex;
    if (A >= B && A >= C) typeIndex = 0;
    else if (B >= A && B >= C) typeIndex = 1;
    else if (C >= A && C >= B) typeIndex = 4; // C最高对应“精明资源手”
    else typeIndex = 0;

    const res = types[typeIndex];
    document.getElementById('free-result').innerText = `你是：${res.name}\n${res.desc}`;
    // 直接显示对应图片
    document.getElementById('result-img').src = res.img;
  }
</script>
</body>
</html>
