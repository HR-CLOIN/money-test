<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搞钱天赋测评</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }
    .page {
      max-width: 500px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.95);
      padding: 30px 25px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      display: none;
      backdrop-filter: blur(10px);
    }
    .page.active {
      display: block;
    }
    h1 {
      font-size: 26px;
      margin-bottom: 12px;
      color: #d63031;
      text-align: center;
    }
    .desc {
      color: #666;
      line-height: 1.6;
      margin-bottom: 30px;
      text-align: center;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a52);
      color: white;
      text-align: center;
      border-radius: 12px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.4);
    }
    .question {
      margin-bottom: 20px;
    }
    .question p {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 16px;
      color: #2d3436;
    }
    .options label {
      display: block;
      padding: 14px;
      border: 1px solid #e0e0e0;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      background: white;
    }
    .options label:hover {
      border-color: #ff6b6b;
      background: #fff5f5;
    }
    .options input {
      margin-right: 10px;
    }
    .nav {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .nav button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .prev {
      background: #f1f1f1;
      color: #666;
    }
    .prev:hover {
      background: #e0e0e0;
    }
    .result-text {
      margin-top: 20px;
      line-height: 1.8;
      color: #333;
      white-space: pre-line;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .result-text h3 {
      color: #d63031;
      margin-bottom: 10px;
      font-size: 20px;
    }
    .result-text h4 {
      color: #2d3436;
      margin: 15px 0 8px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<!-- 欢迎页 -->
<div class="page active" id="page-welcome">
  <h1>搞钱天赋测评</h1>
  <p class="desc">10题测出你天生适合靠什么发财，找到你的吸金体质！</p>
  <button class="btn" onclick="startTest()">开始测评</button>
</div>

<!-- 答题页 -->
<div class="page" id="page-question">
  <div class="question">
    <p id="q-title"></p>
  </div>
  <div class="options" id="q-options"></div>
  <div class="nav">
    <button class="prev" onclick="prevQ()">上一题</button>
    <button class="btn" onclick="nextQ()">下一题</button>
  </div>
</div>

<!-- 结果页 -->
<div class="page" id="page-result">
  <h1>你的搞钱天赋结果</h1>
  <div id="result-text" class="result-text"></div>
</div>

<script>
  // 题目
  const questions = [
    {
      title: "1. 看到别人赚钱，你第一反应是？",
      options: [
        { text: "A 研究他的逻辑和方法", score: { A:1, B:0, C:0 } },
        { text: "B 觉得自己也能上手试试", score: { A:0, B:1, C:0 } },
        { text: "C 羡慕，但不太想行动", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "2. 你更擅长？",
      options: [
        { text: "A 分析趋势、找规律、做判断", score: { A:1, B:0, C:0 } },
        { text: "B 动手做事、落地执行", score: { A:0, B:1, C:0 } },
        { text: "C 聊天、社交、维护关系", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "3. 空闲时间你更偏向？",
      options: [
        { text: "A 刷资讯、学新知识、看机会", score: { A:1, B:0, C:0 } },
        { text: "B 做点小项目/兼职/动手折腾", score: { A:0, B:1, C:0 } },
        { text: "C 发朋友圈、拍视频、玩社交平台", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "4. 你对风险的态度？",
      options: [
        { text: "A 愿意为高收益承担合理风险", score: { A:1, B:0, C:0 } },
        { text: "B 稳一点，别亏最重要", score: { A:0, B:1, C:0 } },
        { text: "C 不太想碰复杂的东西", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "5. 别人对你的常见评价？",
      options: [
        { text: "A 脑子灵、看得远", score: { A:1, B:0, C:0 } },
        { text: "B 靠谱、能成事", score: { A:0, B:1, C:0 } },
        { text: "C 人缘好、会说话", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "6. 你更适合哪种赚钱方式？",
      options: [
        { text: "A 靠眼光/决策赚钱", score: { A:1, B:0, C:0 } },
        { text: "B 靠能力/执行力赚钱", score: { A:0, B:1, C:0 } },
        { text: "C 靠人气/表达/影响力赚钱", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "7. 给你1w启动资金，你会？",
      options: [
        { text: "A 理财、投资、买基金/课程", score: { A:1, B:0, C:0 } },
        { text: "B 做小生意、囤货、实体项目", score: { A:0, B:1, C:0 } },
        { text: "C 打造账号、做内容、包装自己", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "8. 遇到赚钱机会，你通常？",
      options: [
        { text: "A 先分析靠不靠谱", score: { A:1, B:0, C:0 } },
        { text: "B 先行动再说", score: { A:0, B:1, C:0 } },
        { text: "C 先问问身边人意见", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "9. 你对“名气/曝光”的看法？",
      options: [
        { text: "A 无所谓，赚到就行", score: { A:1, B:0, C:0 } },
        { text: "B 能帮我赚钱就好", score: { A:0, B:1, C:0 } },
        { text: "C 很喜欢被人关注、被认可", score: { A:0, B:0, C:1 } }
      ]
    },
    {
      title: "10. 你心中赚钱最重要的是？",
      options: [
        { text: "A 眼光", score: { A:1, B:0, C:0 } },
        { text: "B 能力", score: { A:0, B:1, C:0 } },
        { text: "C 人脉", score: { A:0, B:0, C:1 } }
      ]
    }
  ];

  // 5种结果（纯文字版，已按你提供的内容完整录入）
  const types = [
    {
      name: "眼光型投资人",
      content: `
<h3>类型 1：眼光型投资人</h3>
<h4>你的天赋：</h4>
一眼看透机会的「预判者」
你天生对趋势、规律、信息差敏感，
比别人更早看到机会，也更懂得避坑。

<h4>你的优势：</h4>
判断力强，不盲目跟风
擅长用脑子赚钱，而非纯体力
对风险有感知，懂得取舍

<h4>你最适合的搞钱方向：</h4>
理财、基金、股票、可转债等投资
信息差生意、中介、资源整合
做决策型副业：选品、规划、咨询

<h4>你的财富雷区：</h4>
想太多、做太少，错过最佳时机
过度理性，不敢下重注
看不起小钱，只盯大机会

<h4>专属搞钱路线：</h4>
每周花 3 小时研究一个领域
小资金试水，建立自己的判断体系
用你的眼光帮别人避坑，变现咨询

<h4>一句话财富箴言：</h4>
你的脑子，就是你最好的资产。
`
    },
    {
      name: "执行力实干家",
      content: `
<h3>类型 2：执行力实干家</h3>
<h4>你的天赋：</h4>
说到做到的「落地王者」
你是最稳、最靠谱、最容易把想法变钱的人。
别人想 100 遍，你做一遍就成了。

<h4>你的优势：</h4>
执行力拉满，不拖延
能吃苦、肯坚持，稳定性极强
做事踏实，容易被信任、被重用

<h4>你最适合的搞钱方向：</h4>
职场晋升、拿高薪、做管理
实体小生意、手艺、技术岗
可复制的标准化副业：代运营、剪辑、服务类

<h4>你的财富雷区：</h4>
只会埋头干，不懂抬头看路
被人当工具人，功劳被抢
不懂得提价、放大收益

<h4>专属搞钱路线：</h4>
把一项技能练到行业前 20%
学会打包服务，提高单价
用执行力带团队，从 “自己干” 变 “带人干”

<h4>一句话财富箴言：</h4>
行动，是普通人逆袭的最低门槛。
`
    },
    {
      name: "影响力流量王",
      content: `
<h3>类型 3：影响力流量王</h3>
<h4>你的天赋：</h4>
一开口就有人听的「吸粉体质」
你天生自带人缘、气场、感染力，
别人靠努力，你靠被喜欢就能赚钱。

<h4>你的优势：</h4>
社交轻松，不社恐
表达欲强，容易被记住
信任成本低，带货、变现极快

<h4>你最适合的搞钱方向：</h4>
自媒体、短视频、直播
带货、团购、社群团长
个人 IP、咨询、知识付费

<h4>你的财富雷区：</h4>
太在意别人看法，内耗严重
只玩不赚，浪费流量
情绪不稳定，影响口碑

<h4>专属搞钱路线：</h4>
大胆出镜 / 发声，先有 1000 个铁粉
把你的擅长变成可卖的产品
用影响力链接资源，赚信息差的钱

<h4>一句话财富箴言：</h4>
有人喜欢你，你就有赚不完的钱。
`
    },
    {
      name: "创意内容家",
      content: `
<h3>类型 4：创意内容家</h3>
<h4>你的天赋：</h4>
靠想法变现的「灵感富翁」
你脑子里总有新奇点子、审美在线、共情力强，
世界是你的素材库，你靠创作就能吃饭。

<h4>你的优势：</h4>
审美、文案、脑洞优于常人
擅长制造情绪价值、治愈感
容易做出爆款内容、差异化产品

<h4>你最适合的搞钱方向：</h4>
设计、文案、摄影、剪辑
文创、手作、插画、艺术相关
内容创业、策划、品牌顾问

<h4>你的财富雷区：</h4>
情绪化、拖延、完美主义
不屑谈钱，觉得俗气
只会创作，不会商业

<h4>专属搞钱路线：</h4>
把创意变成可交付的作品
固定输出，积累作品集
给商业品牌服务，让创意直接变现

<h4>一句话财富箴言：</h4>
你的灵感，比体力值钱一万倍。
`
    },
    {
      name: "精明资源手",
      content: `
<h3>类型 5：精明资源手</h3>
<h4>你的天赋：</h4>
把人链接起来的「人脉枢纽」
你不用自己干活，
只靠链接、撮合、信息就能赚钱。

<h4>你的优势：</h4>
人脉广、消息灵、情商高
懂人性，会说话，不得罪人
擅长整合，用别人的资源赚钱

<h4>你最适合的搞钱方向：</h4>
中介、商务、渠道合作
资源对接、猎头、商务居间
社群运营、人脉变现

<h4>你的财富雷区：</h4>
什么都想掺和，没有主业
只混脸熟，不做深度信任
不好意思收中介费

<h4>专属搞钱路线：</h4>
深耕一个领域，成为专家型人脉
大胆收介绍费 / 服务费
用信息差做轻资产、无本生意

<h4>一句话财富箴言：</h4>
你认识谁、能链接谁，就是你的财富。
`
    }
  ];

  let currentQ = 0;
  let answers = Array(questions.length).fill(null);

  // 切换页面
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  // 开始
  function startTest() {
    currentQ = 0;
    renderQ();
    showPage('page-question');
  }

  // 渲染题目
  function renderQ() {
    const q = questions[currentQ];
    document.getElementById('q-title').innerText = q.title;
    const box = document.getElementById('q-options');
    box.innerHTML = '';
    q.options.forEach((opt, i) => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="radio" name="q" value="${i}" ${answers[currentQ]==i ? 'checked' : ''}> ${opt.text}`;
      box.appendChild(label);
    });
  }

  // 上一题
  function prevQ() {
    if (currentQ > 0) {
      saveAnswer();
      currentQ--;
      renderQ();
    }
  }

  // 下一题 / 完成
  function nextQ() {
    saveAnswer();
    if (currentQ < questions.length - 1) {
      currentQ++;
      renderQ();
    } else {
      calcResult();
      showPage('page-result');
    }
  }

  // 保存答案
  function saveAnswer() {
    const sel = document.querySelector('input[name="q"]:checked');
    if (sel) answers[currentQ] = parseInt(sel.value);
  }

  // 算分并显示结果
  function calcResult() {
    let A = 0, B = 0, C = 0;
    answers.forEach((v, i) => {
      if (v == null) return;
      const s = questions[i].options[v].score;
      A += s.A;
      B += s.B;
      C += s.C;
    });

    let typeIndex;
    if (A >= B && A >= C) typeIndex = 0;
    else if (B >= A && B >= C) typeIndex = 1;
    else if (C >= A && C >= B) typeIndex = 4; // C最高对应“精明资源手”
    else typeIndex = 0;

    const res = types[typeIndex];
    document.getElementById('result-text').innerHTML = res.content;
  }
</script>
</body>
</html>
